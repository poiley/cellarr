# Differential-oracle reference stack: PINNED Sonarr + Radarr, run by the real apps so cellarr's
# parser/decision output can be diffed against them. See docs/11-testing.md and docs/04-parser.md.
#
# ISOLATION: never run this directly. Run via `just oracle`, which sets a per-run compose project
# name (`-p cellarr-oracle-<RUN_ID>`) and maps host port 0 (OS-allocated). That namespaces all
# containers/networks/volumes per run, so many workflows can run the oracle at once without
# colliding. Ports below use `0:` so the host port is ephemeral and discovered at runtime.
#
# Pins are EXACT and deliberate: bumping a pin changes the parity baseline and is a reviewed change.
# Verify/curate these tags in Phase 0; placeholders here document intent.

services:
  sonarr:
    # PIN — Sonarr 4.0.17.2952, the version parity was measured against (docs/parity/PARITY_REPORT.md).
    image: lscr.io/linuxserver/sonarr@sha256:02bc962946fef994e67a38152446df25c10a52f8583aefeeb6467f9dd44cab99
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "0:8989"        # host port OS-allocated; discovered via `docker compose port sonarr 8989`
    tmpfs:
      - /config         # ephemeral config; oracle seeds known profiles via API at startup
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  radarr:
    # PIN — Radarr 6.2.1.10461, the version parity was measured against (docs/parity/PARITY_REPORT.md).
    image: lscr.io/linuxserver/radarr@sha256:1e95b5c13fe015361a9ae1c4d99fc2336816790aaea60fa74b2ffebe076a69e0
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "0:7878"
    tmpfs:
      - /config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 5s
      timeout: 3s
      retries: 30

# Notes for the harness (Phase 0):
# - Seed each app's API key + a known set of quality profiles/custom formats at startup so decision
#   parity is compared against a KNOWN config, not defaults.
# - Drive their parse/decision surface over the corpus inputs; diff against cellarr; emit parity %.
# - Record intentional divergences to an allow-list with rationale (see docs/11-testing.md).
