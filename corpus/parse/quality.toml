# Quality (resolution + source + codec) extraction across the spectrum.
# Clean-room facts.

[[case]]
input  = "Movie.2019.480p.DVDRip.XviD-GRP"
source = "SD DVD rip"
[case.expected]
resolution = "480p"
source     = "dvd"
codec      = "other"

[[case]]
input  = "Movie.2019.576p.PAL.DVD.x264-GRP"
source = "576p PAL DVD"
[case.expected]
resolution = "576p"
source     = "dvd"
codec      = "x264"

[[case]]
input  = "Movie.2019.720p.BRRip.x264-GRP"
source = "BRRip is bluray-derived"
[case.expected]
resolution = "720p"
source     = "bluray"
codec      = "x264"

[[case]]
input  = "Movie.2019.1080p.WEBRip.x265-GRP"
source = "1080p WEBRip x265"
[case.expected]
resolution = "1080p"
source     = "webrip"
codec      = "x265"

[[case]]
input  = "Movie.2019.2160p.BluRay.REMUX.HEVC.TrueHD.7.1.Atmos-FraMeSToR"
source = "4K remux with object audio"
[case.expected]
resolution = "2160p"
source     = "remux"
codec      = "x265"
audio      = ["TrueHD", "Atmos"]

[[case]]
input  = "Movie.2019.4K.UHD.BluRay.2160p.HDR.HEVC-GRP"
source = "4K alias plus explicit 2160p"
[case.expected]
resolution = "2160p"
source     = "bluray"
codec      = "x265"
hdr        = ["hdr10"]

[[case]]
input  = "Old.Movie.2001.CAM.x264-GRP"
source = "cam source (lowest quality)"
[case.expected]
source = "cam"
codec  = "x264"

[[case]]
input  = "Old.Movie.2001.HDCAM.x264-GRP"
source = "HDCAM is still cam-tier"
[case.expected]
source = "cam"

[[case]]
input  = "Show.S01E01.PDTV.XviD-GRP"
source = "PDTV is SDTV-tier"
[case.expected]
source = "sdtv"
codec  = "other"

[[case]]
input  = "Movie.2019.1080p.BluRay.AV1-GRP"
source = "AV1 codec"
[case.expected]
resolution = "1080p"
codec      = "av1"

[[case]]
input  = "Movie.2019.1080p.WEB-DL.DDP5.1.H.265-GRP"
source = "dotted H.265 spelling maps to x265"
[case.expected]
codec  = "x265"
source = "web-dl"

[[case]]
input  = "Movie.2019.2160p.DV.HDR10Plus.WEB-DL.HEVC-GRP"
source = "HDR10+ and Dolby Vision both present"
[case.expected]
hdr = ["dolbyvision", "hdr10plus"]

# --- Pre-retail movie tiers and full-disc / raw buckets (Radarr vocabulary). ---
# These map to dedicated quality buckets in resolve_quality; the parser must
# detect each distinct source token. Clean-room facts.

[[case]]
input  = "Movie.2019.WORKPRINT.XviD-GRP"
source = "workprint is the lowest movie tier"
[case.expected]
source = "workprint"

[[case]]
input  = "Movie.2019.TELESYNC.x264-GRP"
source = "telesync (cam synced to external audio)"
[case.expected]
source = "telesync"

[[case]]
input  = "Movie.2019.HDTS.x264-GRP"
source = "HDTS is telesync-tier"
[case.expected]
source = "telesync"

[[case]]
input  = "Movie.2019.TELECINE.x264-GRP"
source = "telecine (film-reel transfer)"
[case.expected]
source = "telecine"

[[case]]
input  = "Movie.2019.DVDSCR.XviD-GRP"
source = "DVD screener"
[case.expected]
source = "dvdscr"

[[case]]
input  = "Movie.2019.SCREENER.x264-GRP"
source = "bare SCREENER token maps to dvdscr"
[case.expected]
source = "dvdscr"

[[case]]
input  = "Movie.2019.REGIONAL.DVD.x264-GRP"
source = "regional early-retail disc beats the generic DVD token"
[case.expected]
source = "regional"

[[case]]
input  = "Movie.2019.DVD-R.PAL-GRP"
source = "recordable-DVD copy is its own bucket above plain DVD"
[case.expected]
source = "dvd-r"

[[case]]
input  = "Movie.2019.2160p.UHD.BR-DISK.HDR-GRP"
source = "explicit BR-DISK full-disc marker (no encode)"
[case.expected]
source = "br-disk"

[[case]]
input  = "Movie.2019.COMPLETE.BLURAY.2160p.HDR-GRP"
source = "COMPLETE.BLURAY = full untouched disc"
[case.expected]
source = "br-disk"

[[case]]
input  = "Show.S01E01.1080i.Raw-HD.MPEG2-GRP"
source = "Raw-HD untouched broadcast capture"
[case.expected]
source = "raw-hd"
