# Single-episode release names → expected season/episode + quality.
# Clean-room: individual input→output facts, re-curated from common scene/p2p
# naming conventions (the same conventions the *arr fixtures encode).

[[case]]
input  = "The.Show.S02E15.1080p.BluRay.x264-GROUP"
source = "derived from common SxxExx scene convention"
notes  = "release group after final dash"
[case.expected]
title       = "The Show"
season      = 2
episode     = 15
resolution  = "1080p"
source      = "bluray"
codec       = "x264"
group       = "GROUP"

[[case]]
input  = "Breaking.Bad.S01E01.720p.HDTV.x264-CTU"
source = "derived from common SxxExx scene convention"
[case.expected]
title      = "Breaking Bad"
season     = 1
episode    = 1
resolution = "720p"
source     = "hdtv"
codec      = "x264"
group      = "CTU"

[[case]]
input  = "Game.of.Thrones.S08E06.1080p.WEB-DL.DD5.1.H.264-GoT"
source = "derived from common SxxExx scene convention"
notes  = "dotted H.264 codec spelling; AC3/DD5.1 audio"
[case.expected]
title      = "Game of Thrones"
season     = 8
episode    = 6
resolution = "1080p"
source     = "web-dl"
codec      = "x264"
group      = "GoT"
audio      = ["AC3"]

[[case]]
input  = "The.Mandalorian.S02E08.2160p.WEB-DL.DDP5.1.Atmos.HDR.HEVC-CAKES"
source = "derived from common SxxExx scene convention"
notes  = "2160p, EAC3/DDP, Atmos, HDR, HEVC"
[case.expected]
title      = "The Mandalorian"
season     = 2
episode    = 8
resolution = "2160p"
source     = "web-dl"
codec      = "x265"
group      = "CAKES"
audio      = ["EAC3", "Atmos"]
hdr        = ["hdr10"]

[[case]]
input  = "Some.Show.s03e09.480p.WEBRip.x264-RARBG"
