# Language-tag extraction. Clean-room facts from common scene language tags.

[[case]]
input  = "Movie.2019.MULTi.1080p.BluRay.x264-FHD"
source = "MULTi tag"
[case.expected]
languages = ["Multi"]

[[case]]
input  = "Film.2019.TRUEFRENCH.1080p.BluRay.x264-GRP"
source = "TRUEFRENCH maps to French"
[case.expected]
languages = ["French"]

[[case]]
input  = "Film.2019.VOSTFR.1080p.WEB-DL.x264-GRP"
source = "VOSTFR subtitled-French tag"
[case.expected]
languages = ["VOSTFR"]

[[case]]
input  = "Movie.2019.GERMAN.DL.1080p.BluRay.x264-GRP"
source = "German dual-language"
[case.expected]
languages = ["German"]

