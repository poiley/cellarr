# --- Quality dominates ------------------------------------------------------

[[case]]
name   = "upgrade_higher_quality_even_with_lower_cf"
source = "precedence rule 2: quality rank dominates"
notes  = "candidate Bluray-2160p (rank 19) over on-disk Bluray-1080p (rank 14) even though cf 0 < 80"
title  = "Movie.2024.2160p.BluRay.x265-GROUP"
[case.parsed]
source     = "bluray"
resolution = "r2160p"
[case.profile]
allowed                = [14, 19]
upgrades_allowed       = true
cutoff_quality         = 20
min_cf_score           = 0
upgrade_until_cf_score = 100
[case.on_disk]
quality_rank = 14
cf_score     = 80
[case.expected]
verdict = "upgrade"

[[case]]
name   = "reject_lower_quality_despite_higher_cf"
source = "precedence rule 2: never downgrade quality to chase CF score"
notes  = "candidate WEBDL-1080p (rank 13, cf 500) is NOT an upgrade over Bluray-1080p (rank 14, cf 0)"
title  = "Movie.2024.1080p.WEB-DL.x264-GROUP"
flags  = ["freeleech"]
[case.parsed]
source     = "web-dl"
resolution = "r1080p"
[case.profile]
allowed                = [13, 14]
upgrades_allowed       = true
cutoff_quality         = 20
min_cf_score           = 0
upgrade_until_cf_score = 1000
[[case.format]]
name  = "great-flag"
score = 500
[[case.format.condition]]
kind = "indexer_flag"
flag = "freeleech"
[case.on_disk]
quality_rank = 14
cf_score     = 0
[case.expected]
verdict = "reject"
reason  = "not_an_upgrade"

