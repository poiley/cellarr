# DECISION vectors for cellarr-decide.
#
# Each case drives `decide(candidate, on_disk, profile)` and asserts the verdict
# kind ("grab" | "upgrade" | "reject") and, for rejects, the reason kind. The
# candidate's (source, resolution) is mapped to a quality rank by the default
# ranking, cellarr_core::QualityRanking::default() (worst -> best). Reference
# ranks used below: DVD=3, CAM=1, WEBDL-1080p=13, Bluray-1080p=14,
# Bluray-2160p=19. See crates/cellarr-core/src/profile.rs (resolve_quality) and
# crates/cellarr-decide/src/quality.rs.
#
# Profile fields:
#   allowed                 = allowed quality ranks
#   upgrades_allowed        = bool
#   cutoff_quality          = quality rank at which upgrading stops
#   min_cf_score            = reject below this total CF score
#   upgrade_until_cf_score  = stop chasing CF score once reached
#   required_languages      = optional list
#
# on_disk (optional): { quality_rank, cf_score }
#
# Provenance required. Re-curated clean-room from the documented precedence
# contract (docs/05-decision-engine.md): hard rejects first; quality dominates;
# CF score breaks ties; both cutoffs to stop; proper/repack policy.

# --- Hard rejects -----------------------------------------------------------

[[case]]
name   = "reject_disallowed_quality"
source = "precedence rule 1: disallowed quality"
notes  = "DVD (rank 3) not in an allowed set of {14}"
title  = "Movie.2024.DVD.x264-GROUP"
[case.parsed]
source     = "dvd"
resolution = "r480p"
[case.profile]
allowed                = [14]
upgrades_allowed       = true
cutoff_quality         = 14
min_cf_score           = 0
upgrade_until_cf_score = 100
[case.expected]
verdict = "reject"
reason  = "quality_not_allowed"

[[case]]
name   = "reject_unknown_quality"
source = "precedence rule 1: unresolvable quality is not allowed"
notes  = "no source/resolution -> cannot resolve a rank"
title  = "Some.Weird.Release-GROUP"
[case.parsed]
[case.profile]
allowed                = [14]
upgrades_allowed       = true
cutoff_quality         = 14
min_cf_score           = 0
upgrade_until_cf_score = 100
[case.expected]
verdict = "reject"
reason  = "quality_not_allowed"

[[case]]
name   = "reject_below_min_cf_score"
source = "precedence rule 1: below minimum CF score"
notes  = "matching -10000 CAM guard sinks total below min 0"
title  = "Movie.2024.CAMRip.x264-GROUP"
[case.parsed]
source     = "cam"
resolution = "r480p"
[case.profile]
allowed                = [1, 14]
upgrades_allowed       = true
cutoff_quality         = 14
min_cf_score           = 0
upgrade_until_cf_score = 100
[[case.format]]
name  = "cam-guard"
score = -10000
[[case.format.condition]]
kind   = "source"
source = "cam"
[case.expected]
verdict = "reject"
reason  = "below_minimum_custom_format_score"

[[case]]
name   = "reject_blocklisted"
source = "precedence rule 1: blocklisted release"
notes  = "blocklist membership supplied by the caller"
title  = "Movie.2024.1080p.BluRay.x264-GROUP"
blocklisted = true
[case.parsed]
source     = "bluray"
resolution = "r1080p"
[case.profile]
allowed                = [14]
upgrades_allowed       = true
cutoff_quality         = 14
min_cf_score           = 0
upgrade_until_cf_score = 100
[case.expected]
verdict = "reject"
reason  = "blocklisted"

[[case]]
name   = "reject_language_requirement_unmet"
source = "precedence rule 1: unmet language requirement"
notes  = "profile requires 'en' but the parse carries only 'de'"
title  = "Film.2024.German.1080p.BluRay.x264-GROUP"
[case.parsed]
source     = "bluray"
resolution = "r1080p"
languages  = ["de"]
[case.profile]
allowed                = [14]
upgrades_allowed       = true
cutoff_quality         = 14
min_cf_score           = 0
upgrade_until_cf_score = 100
required_languages     = ["en"]
[case.expected]
verdict = "reject"
reason  = "language_requirement_unmet"

