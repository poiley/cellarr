# Naming vectors: standard TV episode on-disk paths.
#
# Each case supplies a naming `format` (the user's template) plus the `tokens`
# a TV `MediaModule` would emit, and asserts the deterministic relative path the
# rename engine renders. Provenance is recorded per case; facts are re-curated
# from Sonarr's standard naming behavior, not copied from any one fixture file.
#
# Consumed by crates/cellarr-fs/tests/naming_corpus.rs and the differential
# oracle. Token names mirror cellarr-core's NamingTokens vocabulary.

[[case]]
source = "derived from Sonarr StandardEpisode naming behavior"
notes  = "season folder + S00E00 token, zero-padded"
format = "{Series Title}/Season {Season}/{Series Title} - S{Season}E{Episode} - {Episode Title}"
[case.tokens]
"Series Title" = "The Expanse"
"Season"       = "02"
"Episode"      = "06"
"Episode Title" = "Paradigm Shift"
[case.expected]
path = "The Expanse/Season 02/The Expanse - S02E06 - Paradigm Shift"

[[case]]
source = "derived from Sonarr quality-in-name behavior"
notes  = "quality and group appended; dot in group preserved"
format = "{Series Title}/Season {Season}/{Series Title} - S{Season}E{Episode} - {Quality} [{Group}]"
[case.tokens]
"Series Title" = "Severance"
"Season"       = "01"
"Episode"      = "09"
"Quality"      = "1080p BluRay x264"
"Group"        = "NTb"
[case.expected]
path = "Severance/Season 01/Severance - S01E09 - 1080p BluRay x264 [NTb]"

[[case]]
source = "derived from Sonarr specials (season 0) handling"
notes  = "season 0 is the Specials season; rendered as folder 'Season 00'"
format = "{Series Title}/Season {Season}/{Series Title} - S{Season}E{Episode}"
[case.tokens]
"Series Title" = "Doctor Who"
"Season"       = "00"
"Episode"      = "14"
[case.expected]
path = "Doctor Who/Season 00/Doctor Who - S00E14"
