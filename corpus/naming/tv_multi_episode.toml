# Naming vectors: multiple episodes contained in a single file.
#
# Two complementary surfaces are pinned here:
#
#  1. The opaque "Episode Range" token — a MediaModule may pre-format the range
#     and the engine substitutes it verbatim (it never re-derives numbering).
#
#  2. The engine-computed `{Episode Block}` token — given the raw `Season` +
#     `Episodes` (a comma-separated list) the engine builds the SxxExx block per
#     the user's chosen `multi_episode` style. The default style is PrefixedRange
#     (TRaSH). Each style below is exercised against the same episode set
#     (S01, episodes 1-3) so the difference is purely the style.
#
# Re-curated from Sonarr multi-episode (anthology / double-length) naming.

[[case]]
source = "derived from Sonarr MultiEpisode naming (contiguous range)"
notes  = "two episodes, one file; range token 'E06-E07'"
format = "{Series Title}/Season {Season}/{Series Title} - S{Season}{Episode Range} - {Episode Titles}"
[case.tokens]
"Series Title"  = "Game of Thrones"
"Season"        = "03"
"Episode Range" = "E09-E10"
"Episode Titles" = "The Rains of Castamere + Mhysa"
[case.expected]
path = "Game of Thrones/Season 03/Game of Thrones - S03E09-E10 - The Rains of Castamere + Mhysa"

[[case]]
source = "derived from Sonarr triple-episode handling"
notes  = "three episodes, one file"
format = "{Series Title}/Season {Season}/{Series Title} - S{Season}{Episode Range}"
[case.tokens]
"Series Title"  = "Avatar The Last Airbender"
"Season"        = "03"
"Episode Range" = "E18-E19-E20"
[case.expected]
path = "Avatar The Last Airbender/Season 03/Avatar The Last Airbender - S03E18-E19-E20"

# --- engine-computed {Episode Block}: one style per case, same episode set ---

[[case]]
source = "derived from Sonarr MultiEpisodeStyle=PrefixedRange (TRaSH default)"
notes  = "default style: S01E01-E03 from raw Season + Episodes list"
format = "{Series Title}/Season {Season:00}/{Series Title} - {Episode Block:00}"
[case.tokens]
"Series Title" = "Firefly"
"Season"       = "1"
"Episodes"     = "1,2,3"
[case.expected]
path = "Firefly/Season 01/Firefly - S01E01-E03"

[[case]]
source = "derived from Sonarr MultiEpisodeStyle=Range"
notes  = "range without the trailing E prefix: S01E01-03"
format = "{Series Title} - {Episode Block:00}"
options = { multi_episode = "range" }
[case.tokens]
"Series Title" = "Firefly"
"Season"       = "1"
"Episodes"     = "1,2,3"
[case.expected]
path = "Firefly - S01E01-03"

[[case]]
source = "derived from Sonarr MultiEpisodeStyle=Extend"
notes  = "every episode listed, each with its own E prefix"
format = "{Series Title} - {Episode Block:00}"
options = { multi_episode = "extend" }
[case.tokens]
"Series Title" = "Firefly"
"Season"       = "1"
"Episodes"     = "1,2,3"
[case.expected]
path = "Firefly - S01E01E02E03"

[[case]]
source = "derived from Sonarr MultiEpisodeStyle=Repeat"
notes  = "season once, each episode repeated with an E prefix"
format = "{Series Title} - {Episode Block:00}"
options = { multi_episode = "repeat" }
[case.tokens]
"Series Title" = "Firefly"
"Season"       = "1"
"Episodes"     = "1,2,3"
[case.expected]
path = "Firefly - S01E01E02E03"

[[case]]
source = "derived from Sonarr MultiEpisodeStyle=Duplicate"
notes  = "full SxxExx block duplicated per episode, dot-joined"
format = "{Series Title} - {Episode Block:00}"
options = { multi_episode = "duplicate" }
[case.tokens]
"Series Title" = "Firefly"
"Season"       = "1"
"Episodes"     = "1,2,3"
[case.expected]
path = "Firefly - S01E01.S01E02.S01E03"

[[case]]
source = "derived from Sonarr MultiEpisodeStyle=Scene"
notes  = "scene style: every adjacent episode joined by -E"
format = "{Series Title} - {Episode Block:00}"
options = { multi_episode = "scene" }
[case.tokens]
"Series Title" = "Firefly"
"Season"       = "1"
"Episodes"     = "1,2,3"
[case.expected]
path = "Firefly - S01E01-E02-E03"

[[case]]
source = "derived from Sonarr single-episode collapse"
notes  = "a single-episode file reduces to SxxEyy under any style (here default)"
format = "{Series Title} - {Episode Block:00}"
[case.tokens]
"Series Title" = "Firefly"
"Season"       = "1"
"Episodes"     = "5"
[case.expected]
path = "Firefly - S01E05"
