# Sonarr anime multi-episode absolute-range vectors.
# Re-curated FACTS from Sonarr's AbsoluteEpisodeNumberParserFixture [TestCase] rows.
# expected: title, absolute<-firstAbsoluteEpisodeNumber; full range is in notes.

[[case]]
input  = '[ANBU-AonE]_SeriesTitle_26-27_[F224EF26].avi'
source = 'Sonarr AbsoluteEpisodeNumberParserFixture (multi-absolute)'
notes  = 'absolute range 26-27'
[case.expected]
title = 'SeriesTitle'
absolute = 26

