# cellarr on the program (rinzler) k3s cluster.
#
# Deployed to its OWN namespace (not the ArgoCD-managed arr-stack) so a direct
# `kubectl apply` is safe and nothing prunes it. Multi-arch image, so NO
# nodeSelector is needed on the mixed arm64/amd64 cluster.
#
# DATABASE: Postgres (see postgres.yaml) rather than the embedded SQLite default.
# On this cluster the config volume is a CIFS/SMB NAS mount, and a SQLite file
# over a network filesystem pays a round-trip per page — the movie/series list
# took 10-15s. A Postgres server (node-local disk, reached over TCP) serves the
# same list in well under a second. The image is the `-postgres`-tagged build
# (`--features postgres`); CELLARR_DATABASE_URL points it at the server.
#
# NAS mounts mirror radarr/sonarr exactly (hostPath to /mnt/unas-* — present on
# all nodes): config (now just logs + the MediaCover artwork cache) on the NAS,
# plus the shared media + downloads trees. Runs as UID/GID 1000 like the
# linuxserver *arr apps.
#
# CONFIG-AS-CODE: cellarr reconciles its DB on boot from a managed-config.yaml
# mounted (read-only) from the `cellarr-managed-config` ConfigMap at
# CELLARR_MANAGED_CONFIG_PATH; ${ENV} secrets in it resolve from the
# `cellarr-secrets` Secret via env: valueFrom: secretKeyRef (docs/17-config-as-code.md).
#
# The ConfigMap and Secret are applied SEPARATELY from gitignored real files so this
# public manifest carries no real config/secrets. Apply order:
#   kubectl -n cellarr create configmap cellarr-managed-config \
#       --from-file=managed-config.yaml=deploy/managed-config.yaml \
#       --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n cellarr apply -f deploy/k8s/cellarr-secret.yaml
#   kubectl apply -f deploy/k8s/postgres.yaml     # the database server (node-local disk)
#   kubectl apply -f deploy/k8s/postgres-backup.yaml # scheduled pg_dump to the NAS
#   kubectl apply -f deploy/k8s/cellarr.yaml
# The secret must carry POSTGRES_PASSWORD and the matching CELLARR_DATABASE_URL
# (postgres://cellarr:<pw>@postgres:5432/cellarr) — see cellarr-secret.example.yaml.
# Templates: deploy/managed-config.example.yaml + deploy/k8s/cellarr-secret.example.yaml.
#
# Reach the UI at https://cellarr.rinzler.cloud (Traefik ingress below).
apiVersion: v1
kind: Namespace
metadata:
  name: cellarr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cellarr
  namespace: cellarr
  labels: { app: cellarr }
spec:
  replicas: 1
  strategy: { type: Recreate } # single instance; the writer-actor still serializes writes
  selector:
    matchLabels: { app: cellarr }
  template:
    metadata:
      labels: { app: cellarr }
    spec:
      securityContext: # match the linuxserver *arr apps (NAS dirs are owned 1000:1000)
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: cellarr
          image: ghcr.io/poiley/cellarr:postgres # --features postgres build
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 9494 }
          env:
            - { name: CELLARR_API__BIND, value: "0.0.0.0" }
            - { name: CELLARR_API__PORT, value: "9494" }
            - { name: CELLARR_DATA_DIR, value: "/data" }
            - { name: TZ, value: "America/Los_Angeles" }
            # Talk to the Postgres server (postgres.yaml), not the SQLite file.
            # The DSN carries the password, so it comes from the Secret.
            - name: CELLARR_DATABASE_URL
              valueFrom: { secretKeyRef: { name: cellarr-secrets, key: CELLARR_DATABASE_URL } }
            # Onboard untracked media on a schedule (adopt confident matches from
            # disk); capped per pass so a huge first scan stages in batches.
            - { name: CELLARR_MEDIA_MANAGEMENT__AUTO_ONBOARD, value: "true" }
            - { name: CELLARR_MEDIA_MANAGEMENT__AUTO_ONBOARD_LIMIT, value: "2000" }
            # Config-as-code: reconcile the DB from this file on boot.
            - { name: CELLARR_MANAGED_CONFIG_PATH, value: "/config/managed-config.yaml" }
            # API key for /api/v3 (the API is reachable via the ingress, so it must
            # be set). Used by Prowlarr's app sync and any external client.
            - name: CELLARR_API__API_KEY
              valueFrom: { secretKeyRef: { name: cellarr-secrets, key: CELLARR_API__API_KEY, optional: true } }
            # Metadata API keys (bootstrap config) + the ${ENV} secrets the managed
            # config references — all from the cellarr-secrets Secret. optional:true so
            # a missing key degrades gracefully instead of crash-looping the pod.
            - name: CELLARR_TVDB__API_KEY
              valueFrom: { secretKeyRef: { name: cellarr-secrets, key: CELLARR_TVDB__API_KEY, optional: true } }
            - name: CELLARR_TMDB__API_KEY
              valueFrom: { secretKeyRef: { name: cellarr-secrets, key: CELLARR_TMDB__API_KEY, optional: true } }
            - name: TRANSMISSION_USER
              valueFrom: { secretKeyRef: { name: cellarr-secrets, key: TRANSMISSION_USER, optional: true } }
            - name: TRANSMISSION_PASS
              valueFrom: { secretKeyRef: { name: cellarr-secrets, key: TRANSMISSION_PASS, optional: true } }
          volumeMounts:
            - { name: config, mountPath: /data } # logs + MediaCover artwork cache, on NAS (DB is Postgres now)
            - { name: managed-config, mountPath: /config, readOnly: true } # config-as-code, from ConfigMap
            - { name: media, mountPath: /media }
            - { name: downloads, mountPath: /downloads }
          readinessProbe:
            tcpSocket: { port: 9494 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 9494 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: config
          hostPath: { path: /mnt/unas-services/configs/cellarr, type: DirectoryOrCreate }
        - name: managed-config
          configMap: { name: cellarr-managed-config }
        - name: media
          hostPath: { path: /mnt/unas-media, type: Directory }
        - name: downloads
          hostPath: { path: /mnt/unas-downloads, type: Directory }
---
apiVersion: v1
kind: Service
metadata:
  name: cellarr
  namespace: cellarr
  labels: { app: cellarr }
spec:
  type: ClusterIP
  selector: { app: cellarr }
  ports:
    - { name: http, port: 9494, targetPort: 9494 }
---
# Traefik ingress, mirroring the cluster convention (grafana/kavita/etc.):
# <app>.rinzler.me + <app>.rinzler.cloud, TLS via cert-manager (letsencrypt-dns).
# *.rinzler.cloud already resolves to the Traefik LB (192.168.1.210).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cellarr
  namespace: cellarr
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: cellarr.rinzler.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: cellarr, port: { number: 9494 } } }
    - host: cellarr.rinzler.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: cellarr, port: { number: 9494 } } }
  tls:
    - hosts: [cellarr.rinzler.me, cellarr.rinzler.cloud]
      secretName: cellarr-tls
