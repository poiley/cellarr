# Postgres for cellarr on the program (rinzler) k3s cluster.
#
# WHY: cellarr's default backend is an embedded SQLite file. On this cluster the
# only writable shared storage is the UniFi UNAS Pro, and SQLite over its CIFS/SMB
# mount pays a network round-trip per page — the movie/series list took 10-15s. A
# Postgres *server* keeps the whole (~15 MB) database in its own RAM buffer cache
# (shared_buffers), so after warmup the read-heavy list queries are served from
# memory with zero storage I/O — sub-second — even though the data files live on
# the NAS. Unlike SQLite, Postgres does plain buffered read()/write() (no mmap'd
# -shm) and is explicitly documented to run on NFS.
#
# STORAGE: the data directory lives on the UNAS Pro's **NFS** export (NFSv3),
# under the same `databases` area the cluster's other apps use, in a dedicated
# `cellarr/` subdir. NFS, never SMB/CIFS — Postgres needs POSIX fsync/locking
# semantics that CIFS does not provide (data corruption otherwise). The node
# mounts it `hard,proto=tcp,timeo=600,retrans=2` (the recommended Postgres-on-NFS
# options). The export squashes ownership to uid/gid 977:988, so Postgres runs as
# that uid (securityContext below) and owns its 0700 data dir.
#
# DURABILITY CAVEAT: the UNAS Pro's server-side NFS export flags aren't settable,
# so `sync` vs `async` can't be verified; on power loss an async export could lose
# the last committed write(s). Mitigated by: single writer, a UPS on the UNAS, and
# the fact that cellarr's library is fully reconstructable from disk + managed
# config. Postgres backups are external (pg_dump); cellarr's in-process snapshot is
# SQLite-only.
#
# The password is in the `cellarr-secrets` Secret (POSTGRES_PASSWORD) applied
# separately; cellarr reads the matching CELLARR_DATABASE_URL. cellarr runs its
# Postgres migrations on boot.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: cellarr
  labels: { app: postgres }
spec:
  type: ClusterIP
  selector: { app: postgres }
  ports:
    - { name: postgres, port: 5432, targetPort: 5432 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: cellarr
  labels: { app: postgres }
spec:
  serviceName: postgres
  replicas: 1 # single writer; never run two Postgres on one PGDATA (corruption)
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      # The UNAS NFS export squashes writes to 977:988; run Postgres as that uid so
      # it owns its data directory (Postgres refuses a data dir it doesn't own).
      securityContext:
        runAsUser: 977
        runAsGroup: 988
        fsGroup: 988
      containers:
        - name: postgres
          image: postgres:17-alpine
          # Hold the whole DB in RAM (shared_buffers >> 15 MB) so reads never touch
          # NFS after warmup, and re-warm the buffer cache after a restart via
          # pg_prewarm autoprewarm (otherwise the first post-restart queries would
          # cold-hit NFS).
          args:
            - "-c"
            - "shared_buffers=128MB"
            - "-c"
            - "shared_preload_libraries=pg_prewarm"
            - "-c"
            - "pg_prewarm.autoprewarm=on"
          ports:
            - { name: postgres, containerPort: 5432 }
          env:
            - { name: POSTGRES_USER, value: "cellarr" }
            - { name: POSTGRES_DB, value: "cellarr" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: cellarr-secrets, key: POSTGRES_PASSWORD } }
            # PGDATA in a subdir of the NFS mount (never the mount root).
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
            - { name: TZ, value: "America/Los_Angeles" }
          volumeMounts:
            - { name: pgdata, mountPath: /var/lib/postgresql/data }
          # First-boot initdb over NFS is slow (many small fsync'd file creates,
          # ~2 min). A startupProbe holds off liveness/readiness until the server
          # is actually up — up to 5 min — so liveness can't SIGKILL Postgres
          # mid-initdb and leave a half-created cluster.
          startupProbe:
            exec: { command: ["pg_isready", "-U", "cellarr", "-d", "cellarr"] }
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "cellarr", "-d", "cellarr"] }
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "cellarr", "-d", "cellarr"] }
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
      volumes:
        # The UNAS Pro NFS export (NFSv3), cellarr's dedicated subdir. Data lives
        # on the NAS; reads are served from Postgres's RAM cache.
        - name: pgdata
          nfs:
            server: 192.168.1.152
            path: /volume/40dcd33b-879a-4793-b244-fa3159edb89c/.srv/.unifi-drive/databases/.data/cellarr
