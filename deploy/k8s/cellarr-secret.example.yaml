# TEMPLATE for the cellarr-secrets Secret. Copy to deploy/k8s/cellarr-secret.yaml
# (gitignored), fill real values, and apply — or create it without a file:
#   kubectl -n cellarr create secret generic cellarr-secrets \
#       --from-literal=CELLARR_TVDB__API_KEY=... --from-literal=CELLARR_TMDB__API_KEY=... \
#       --from-literal=TRANSMISSION_USER= --from-literal=TRANSMISSION_PASS=
#
# Keys here are wired into the pod env by deploy/k8s/cellarr.yaml + postgres.yaml:
#  - POSTGRES_PASSWORD: the Postgres role password (consumed by postgres.yaml).
#  - CELLARR_DATABASE_URL: the full DSN cellarr connects with; its password MUST
#    match POSTGRES_PASSWORD —
#      postgres://cellarr:<POSTGRES_PASSWORD>@postgres:5432/cellarr
#  - CELLARR_TVDB__API_KEY / CELLARR_TMDB__API_KEY: metadata (bootstrap config).
#  - TRANSMISSION_USER / TRANSMISSION_PASS: referenced as ${ENV} by managed-config.yaml.
# Add one entry per ${VAR} your managed-config.yaml uses (indexer keys, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: cellarr-secrets
  namespace: cellarr
  labels: { app: cellarr }
type: Opaque
stringData:
  # Generate once (e.g. `openssl rand -hex 24`) and reuse in both values below.
  # CELLARR_DATABASE_URL format (fill the same password in):
  #   postgres://cellarr:<POSTGRES_PASSWORD>@postgres:5432/cellarr
  POSTGRES_PASSWORD: "REPLACE_ME"
  CELLARR_DATABASE_URL: "REPLACE_ME"
  CELLARR_TVDB__API_KEY: "REPLACE_ME"
  CELLARR_TMDB__API_KEY: "REPLACE_ME"
  TRANSMISSION_USER: ""
  TRANSMISSION_PASS: ""
