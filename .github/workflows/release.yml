name: release

# Build the web UI (embedded into the binary), cross-compile a static arm64
# binary, and publish a container image to GHCR on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/poiley/cellarr

jobs:
  # Detect whether this push actually touched code/build inputs. Manifest- or
  # docs-only pushes (deploy/**, docs/**, *.md) don't change the binary or image,
  # so the ~10-min cross-compile image jobs below skip when `code` is false.
  # On a first push / missing base ref, paths-filter compares against the repo's
  # default branch and treats everything as changed, so the image still builds.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'web/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - '.github/workflows/release.yml'

  # Validate the opt-in OTLP feature compiles. It is off by default (the image
  # below builds without it), so nothing else exercises it — this native check
  # keeps the exporter path from bitrotting. Non-blocking: it does not gate the
  # image build, so a default-feature deploy still ships if only this breaks.
  otlp-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # rust-embed's derive reads this folder at macro time; the built UI is not
      # needed to type-check, so an empty dir satisfies it without a web build.
      - name: Stub embedded web assets
        run: mkdir -p web/dist
      - name: cargo check --features otlp
        run: cargo check --locked -p cellarr-cli --features otlp

  # Validate the opt-in Postgres backend compiles. The default image below is
  # SQLite; this native check keeps the Postgres persistence path (dialect,
  # migrations, connect) from bitrotting. Non-blocking: does not gate the image.
  pg-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Stub embedded web assets
        run: mkdir -p web/dist
      - name: cargo check --features postgres
        run: cargo check --locked -p cellarr-cli --features postgres

  # Run the cellarr-db repository tests against a REAL Postgres 17. Unlike
  # pg-check/otlp-check (which only `cargo check`), this actually executes the
  # test suite, so a Postgres-path regression in a query surfaces here. Each test
  # isolates itself in a unique Postgres schema (test-support helper), so the
  # whole suite runs against the one service container without cross-contamination.
  # Non-blocking: does not gate the image build (mirrors pg-check's role).
  test-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: cellarr
          POSTGRES_DB: cellarr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CELLARR_TEST_DATABASE_URL: postgres://postgres:cellarr@127.0.0.1:5432/cellarr
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # rust-embed reads this at macro time; the tests don't need the built UI.
      - name: Stub embedded web assets
        run: mkdir -p web/dist
      - name: cargo test -p cellarr-db --features postgres
        run: cargo test --locked -p cellarr-db --features postgres

  # Run the cellarr-db tests on the DEFAULT (SQLite) backend. `just test` is the
  # local SQLite gate, but nothing here exercised it — otlp-check/pg-check only
  # `cargo check` the cli (not the db test target). This validates the SQLite arm
  # of the shared test harness so a change can't break the default build untested.
  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Stub embedded web assets
        run: mkdir -p web/dist
      # cellarr-db (repo layer) + cellarr-jobs (the acquisition pipeline: grab /
      # track / self-heal / import) + cellarr-cli (the live handler that drives
      # the runner: the scheduler→handler→runner→import chain and the reconcile
      # sweep). All run on the default SQLite backend with no services, so a
      # pipeline regression (e.g. blocklisting on a transient client fault, or the
      # reconcile mishandling a completed/stalled/dead download) surfaces in CI.
      - name: cargo test (db + jobs + cli)
        run: cargo test --locked -p cellarr-db -p cellarr-jobs -p cellarr-cli

  image:
    needs: [changes]
    # Build on any code change, and always on a manual dispatch (a human clicking
    # "Run workflow" wants a rebuild even though paths-filter sees no diff vs itself).
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 1. Build the web UI -> web/dist (rust-embed bakes it into the binary).
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      # 2. Cross-compile static musl binaries for both arches (cross handles the
      #    musl + C toolchain for the bundled SQLite). Multi-arch so the image runs
      #    on any node of the mixed (arm64 + amd64) cluster, no nodeSelector needed.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Cross-compile cellarr (arm64 + amd64)
        run: |
          cross build --release --locked -p cellarr-cli --target aarch64-unknown-linux-musl
          cross build --release --locked -p cellarr-cli --target x86_64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/cellarr ./cellarr-arm64
          cp target/x86_64-unknown-linux-musl/release/cellarr  ./cellarr-amd64
          file ./cellarr-arm64 ./cellarr-amd64

      # 3. Assemble + push the multi-arch image (the Dockerfile COPYs the per-arch
      #    binary via TARGETARCH).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  # Postgres-backed image, published alongside the default (SQLite) image under a
  # `-postgres` tag. `:latest` stays the offline single-binary SQLite default; a
  # deployment whose SQLite file would sit on high-latency network storage runs
  # this image instead, pointed at a Postgres server via CELLARR_DATABASE_URL.
  image-postgres:
    needs: [changes]
    # Build on any code change, and always on a manual dispatch (a human clicking
    # "Run workflow" wants a rebuild even though paths-filter sees no diff vs itself).
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Cross-compile cellarr --features postgres (arm64 + amd64)
        run: |
          cross build --release --locked -p cellarr-cli --features postgres --target aarch64-unknown-linux-musl
          cross build --release --locked -p cellarr-cli --features postgres --target x86_64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/cellarr ./cellarr-arm64
          cp target/x86_64-unknown-linux-musl/release/cellarr  ./cellarr-amd64
          file ./cellarr-arm64 ./cellarr-amd64

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=postgres
            type=sha,format=long,suffix=-postgres
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
